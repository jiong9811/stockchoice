<!DOCTYPE html>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glow-effect {
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }
        
        .stock-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .stock-card:hover {
            transform: translateY(-2px);
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .metric-badge {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .positive { color: #34d399; }
        .negative { color: #f87171; }
        
        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            margin-top: -6px;
        }
        
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>

                {code: '603288', name: '海天味业', sector: '消费', fullCode: 'sh603288'},
                {code: '603501', name: '韦尔股份', sector: '科技', fullCode: 'sh603501'},
                {code: '603986', name: '兆易创新', sector: '科技', fullCode: 'sh603986'},
                {code: '603993', name: '洛阳钼业', sector: '有色', fullCode: 'sh603993'}
            ]
        };

        let currentStrategy = 'growth';
        let currentData = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            loadMarketIndex();
        });

        // 腾讯API获取股票数据
        async function fetchStockData(stockCode) {
            try {
                // 使用CORS代理访问腾讯API
                const proxyUrls = [
                    `https://api.allorigins.win/get?url=${encodeURIComponent(`${TX_API}${stockCode}`)}`,
                    `https://corsproxy.io/?${encodeURIComponent(`${TX_API}${stockCode}`)}`
                ];
                
                const response = await fetch(proxyUrls[0]);
                const result = await response.json();
                
                if(result.contents) {
                    // 解析腾讯API返回的数据
                    // 格式: v_sz000001="1~平安银行~000001~10.50~0.15~1.45~..."
                    const dataStr = result.contents;
                    const match = dataStr.match(/v_[^=]+="([^"]+)"/);
                    
                    if(match) {
                        const fields = match[1].split('~');
                        return {
                            name: fields[1],
                            code: fields[2],
                            price: parseFloat(fields[3]),
                            change: parseFloat(fields[4]),
                            changePercent: parseFloat(fields[5]),
                            volume: parseFloat(fields[6]),
                            turnover: parseFloat(fields[7]),
                            marketCap: parseFloat(fields[45]) || 0, // 总市值
                            pe: parseFloat(fields[52]) || 0, // 市盈率
                            pb: parseFloat(fields[53]) || 0, // 市净率
                            high: parseFloat(fields[33]),
                            low: parseFloat(fields[34]),
                            open: parseFloat(fields[5]),
                            prevClose: parseFloat(fields[4])
                        };
                    }
                }
                return null;
            } catch(e) {
                console.error('Fetch error:', e);
                return null;
            }
        }

        // 获取大盘指数
        async function loadMarketIndex() {
            const indices = [
                {id: 'shIndex', code: 'sh000001'},
                {id: 'szIndex', code: 'sz399001'},
                {id: 'cyIndex', code: 'sz399006'}
            ];
            
            for(let idx of indices) {
                const data = await fetchStockData(idx.code);
                if(data) {
                    const changePercent = data.changePercent;
                    const color = changePercent >= 0 ? 'positive' : 'negative';
                    const sign = changePercent >= 0 ? '+' : '';
                    document.getElementById(idx.id).innerHTML = 
                        `<span class="${color}">${data.price.toFixed(2)} (${sign}${changePercent.toFixed(2)}%)</span>`;
                }
            }
        }

        function setStrategy(strategy) {
            currentStrategy = strategy;
            document.querySelectorAll('.strategy-btn').forEach(btn => {
                if(btn.dataset.strategy === strategy) {
                    btn.classList.remove('bg-slate-800/50', 'border-slate-700', 'text-slate-400');
                    btn.classList.add('bg-blue-600/20', 'border-blue-500/50', 'text-blue-300', 'active');
                } else {
                    btn.classList.add('bg-slate-800/50', 'border-slate-700', 'text-slate-400');
                    btn.classList.remove('bg-blue-600/20', 'border-blue-500/50', 'text-blue-300', 'active');
                }
            });
        }

        function updateScoreDisplay(value) {
            document.getElementById('scoreThreshold').textContent = value;
        }

        async function runAIScreening() {
            const loadingState = document.getElementById('loadingState');
            const stockList = document.getElementById('stockList');
            const progressBar = document.getElementById('progressBar');
            
            loadingState.classList.remove('hidden');
            stockList.style.opacity = '0.5';
            
            const pool = document.getElementById('stockPool').value;
            const stocks = STOCK_POOLS[pool] || STOCK_POOLS.hs300;
            const threshold = parseInt(document.getElementById('scoreRange').value);
            
            currentData = [];
            
            // 获取前15只股票的实时数据
            for(let i = 0; i < Math.min(stocks.length, 15); i++) {
                const stock = stocks[i];
                progressBar.style.width = `${(i + 1) / 15 * 100}%`;
                
                const realData = await fetchStockData(stock.fullCode);
                
                if(realData && realData.price > 0) {
                    const aiScore = calculateAIScore(realData, currentStrategy);
                    if(aiScore >= threshold) {
                        currentData.push({
                            ...stock,
                            price: realData.price,
                            change: realData.changePercent,
                            marketCap: (realData.marketCap / 100000000).toFixed(0) + '亿',
                            pe: realData.pe.toFixed(1),
                            pb: realData.pb.toFixed(1),
                            volume: realData.volume,
                            turnover: realData.turnover,
                            score: aiScore,
                            aiTag: getAITag(aiScore),
                            trend: generateTrend(realData),
                            realData: realData,
                            isReal: true
                        });
                    }
                } else {
                    // 使用模拟数据作为fallback
                    await new Promise(r => setTimeout(r, 100));
                    const mockScore = Math.floor(Math.random() * 20) + 80;
                    if(mockScore >= threshold) {
                        currentData.push({
                            ...stock,
                            price: (Math.random() * 100 + 10).toFixed(2),
                            change: (Math.random() * 6 - 2).toFixed(2),
                            marketCap: (Math.random() * 5000 + 100).toFixed(0) + '亿',
                            pe: (Math.random() * 30 + 5).toFixed(1),
                            pb: (Math.random() * 5 + 1).toFixed(1),
                            volume: Math.floor(Math.random() * 1000000),
                            turnover: (Math.random() * 5).toFixed(2),
                            score: mockScore,
                            aiTag: getAITag(mockScore),
                            trend: Array(6).fill(0).map(() => Math.random() * 100),
                            isReal: false
                        });
                    }
                }
            }
            
            // Sort based on strategy
            if(currentStrategy === 'growth') {
                currentData.sort((a, b) => b.change - a.change);
            } else if(currentStrategy === 'value') {
                currentData.sort((a, b) => a.pe - b.pe);
            } else if(currentStrategy === 'momentum') {
                currentData.sort((a, b) => b.score - a.score);
            }
            
            loadingState.classList.add('hidden');
            stockList.style.opacity = '1';
            renderStocks();
            updateInsights();
        }

        function calculateAIScore(data, strategy) {
            let score = 70;
            const change = data.changePercent;
            const pe = data.pe;
            const pb = data.pb;
            
            if(strategy === 'growth') {
                if(change > 3) score += 10;
                if(change > 5) score += 5;
                if(pe > 0 && pe < 50) score += 5;
                if(data.volume > 100000) score += 5;
            } else if(strategy === 'value') {
                if(pe > 0 && pe < 20) score += 15;
                if(pb > 0 && pb < 2) score += 10;
                if(change > 0 && change < 3) score += 5;
            } else if(strategy === 'momentum') {
                if(change > 2) score += 10;
                if(data.volume > 500000) score += 10;
                if(change > 5) score += 5;
            }
            
            if(pe < 0) score -= 10;
            return Math.min(98, Math.max(60, score));
        }

        function getAITag(score) {
            if(score >= 90) return '强烈推荐';
            if(score >= 85) return '买入';
            if(score >= 80) return '关注';
            return '观望';
        }

        function generateTrend(data) {
            const base = data.price || 50;
            return Array(6).fill(0).map((_, i) => base * (1 + (Math.random() - 0.5) * 0.1));
        }

        function renderStocks() {
            const container = document.getElementById('stockList');
            
            if(currentData.length === 0) {
                container.innerHTML = `
                    <div class="glass-panel rounded-2xl p-12 text-center">
                        <i class="fas fa-search text-4xl text-slate-600 mb-4"></i>
                        <p class="text-slate-400">未找到符合条件的股票，请调整筛选条件</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = currentData.map((stock, index) => `
                <div class="stock-card glass-panel rounded-xl p-6 cursor-pointer ${stock.isReal ? 'border-l-4 border-green-500/50' : 'border-l-4 border-yellow-500/50'}" 
                     onclick="showStockDetail(${index})" 
                     style="animation: fadeIn 0.5s ease-out ${index * 0.1}s both;">
                    
                    ${!stock.isReal ? '<div class="absolute top-2 right-2 text-xs text-yellow-500/70"><i class="fas fa-database mr-1"></i>模拟</div>' : ''}
                    
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center text-lg font-bold text-slate-300">
                                ${stock.name[0]}
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-slate-100">${stock.name}</h3>
                                <p class="text-sm text-slate-500">${stock.code} · ${stock.sector}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold ${stock.change >= 0 ? 'positive' : 'negative'}">
                                ¥${parseFloat(stock.price).toFixed(2)}
                            </div>
                            <div class="text-sm ${stock.change >= 0 ? 'positive' : 'negative'}">
                                <i class="fas fa-caret-${stock.change >= 0 ? 'up' : 'down'}"></i>
                                ${stock.change > 0 ? '+' : ''}${stock.change}%
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-4 gap-4 mb-4">
                        <div class="metric-badge rounded-lg p-2 text-center">
                            <div class="text-xs text-slate-500 mb-1">市值</div>
                            <div class="text-sm font-semibold text-slate-300">${stock.marketCap}</div>
                        </div>
                        <div class="metric-badge rounded-lg p-2 text-center">
                            <div class="text-xs text-slate-500 mb-1">PE</div>
                            <div class="text-sm font-semibold text-slate-300">${stock.pe}</div>
                        </div>
                        <div class="metric-badge rounded-lg p-2 text-center">
                            <div class="text-xs text-slate-500 mb-1">PB</div>
                            <div class="text-sm font-semibold text-slate-300">${stock.pb}</div>
                        </div>
                        <div class="metric-badge rounded-lg p-2 text-center">
                            <div class="text-xs text-slate-500 mb-1">换手</div>
                            <div class="text-sm font-semibold ${stock.turnover > 5 ? 'text-red-400' : 'text-slate-300'}">${stock.turnover}%</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="px-3 py-1 rounded-full text-xs font-medium ${getScoreColor(stock.score)} bg-opacity-20">
                                AI评分: ${stock.score}
                            </span>
                            <span class="px-3 py-1 rounded-full text-xs font-medium bg-blue-500/20 text-blue-300 border border-blue-500/30">
                                ${stock.aiTag}
                            </span>
                        </div>
                        <div class="flex space-x-1 h-8 items-end">
                            ${stock.trend.map((price, i) => {
                                const min = Math.min(...stock.trend);
                                const max = Math.max(...stock.trend);
                                const height = max === min ? 50 : ((price - min) / (max - min) * 100);
                                return `<div class="w-1.5 bg-blue-500/60 rounded-t" style="height: ${Math.max(20, height)}%"></div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getScoreColor(score) {
            if(score >= 90) return 'bg-green-500 text-green-400';
            if(score >= 80) return 'bg-blue-500 text-blue-400';
            return 'bg-yellow-500 text-yellow-400';
        }

        function updateInsights() {
            const insights = document.getElementById('aiInsights');
            const avgScore = currentData.reduce((a, b) => a + b.score, 0) / currentData.length;
            const realCount = currentData.filter(s => s.isReal).length;
            
            insights.innerHTML = `
                <div class="p-3 bg-slate-800/50 rounded-lg border-l-2 border-blue-500">
                    <p class="text-sm text-slate-300">本次筛选平均AI评分: <span class="text-blue-400 font-bold">${avgScore.toFixed(1)}</span></p>
                    <span class="text-xs text-slate-500 mt-1 block">${realCount}只实时数据，${currentData.length - realCount}只模拟数据</span>
                </div>
                <div class="p-3 bg-slate-800/50 rounded-lg border-l-2 border-green-500">
                    <p class="text-sm text-slate-300">检测到${currentData.filter(s => s.change > 3).length}只股票涨幅超过3%</p>
                    <span class="text-xs text-slate-500 mt-1 block">实时计算</span>
                </div>
                <div class="p-3 bg-slate-800/50 rounded-lg border-l-2 border-purple-500">
                    <p class="text-sm text-slate-300">建议关注${currentStrategy === 'value' ? '低估值' : '高成长'}标的</p>
                    <span class="text-xs text-slate-500 mt-1 block">AI建议</span>
                </div>
            `;
        }

        function showStockDetail(index) {
            const stock = currentData[index];
            if(!stock) return;
            
            const modal = document.getElementById('stockModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-100 mb-1">${stock.name}</h2>
                        <p class="text-slate-400">${stock.code} | ${stock.sector} ${stock.isReal ? '<span class="text-green-500 text-xs">(实时数据)</span>' : '<span class="text-yellow-500 text-xs">(模拟数据)</span>'}</p>
                    </div>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-white transition">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-sm text-slate-500 mb-1">当前价格</div>
                        <div class="text-3xl font-bold ${stock.change >= 0 ? 'positive' : 'negative'}">¥${parseFloat(stock.price).toFixed(2)}</div>
                        <div class="text-sm ${stock.change >= 0 ? 'positive' : 'negative'} mt-1">
                            ${stock.change > 0 ? '+' : ''}${stock.change}%
                        </div>
                    </div>
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-sm text-slate-500 mb-1">AI综合评分</div>
                        <div class="text-3xl font-bold text-blue-400">${stock.score}</div>
                        <div class="text-sm text-slate-400 mt-1">${stock.aiTag}</div>
                    </div>
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-sm text-slate-500 mb-1">技术信号</div>
                        <div class="text-3xl font-bold text-purple-400">${stock.change > 5 ? '强势' : stock.change > 0 ? '看多' : '观望'}</div>
                        <div class="text-sm text-slate-400 mt-1">基于${currentStrategy}策略</div>
                    </div>
                </div>
                
                <div class="mb-6">
                    <canvas id="detailChart" height="300"></canvas>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="p-3 bg-slate-800/50 rounded-lg">
                        <div class="text-xs text-slate-500">市盈率(TTM)</div>
                        <div class="text-lg font-semibold text-slate-200">${stock.pe}</div>
                    </div>
                    <div class="p-3 bg-slate-800/50 rounded-lg">
                        <div class="text-xs text-slate-500">市净率</div>
                        <div class="text-lg font-semibold text-slate-200">${stock.pb}</div>
                    </div>
                    <div class="p-3 bg-slate-800/50 rounded-lg">
                        <div class="text-xs text-slate-500">换手率</div>
                        <div class="text-lg font-semibold text-slate-200">${stock.turnover}%</div>
                    </div>
                    <div class="p-3 bg-slate-800/50 rounded-lg">
                        <div class="text-xs text-slate-500">成交量</div>
                        <div class="text-lg font-semibold text-slate-200">${(stock.volume / 10000).toFixed(0)}万手</div>
                    </div>
                </div>
                
                <div class="flex space-x-4">
                    <button class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold transition">
                        <i class="fas fa-plus mr-2"></i>加入自选
                    </button>
                    <button class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-semibold transition">
                        <i class="fas fa-bell mr-2"></i>价格提醒
                    </button>
                </div>
            `;
            
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                const ctx = document.getElementById('detailChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['9:30', '10:30', '11:30', '13:30', '14:30', '15:00'],
                        datasets: [{
                            label: '价格走势',
                            data: stock.trend,
                            borderColor: stock.change >= 0 ? '#34d399' : '#f87171',
                            backgroundColor: stock.change >= 0 ? 'rgba(52, 211, 153, 0.1)' : 'rgba(248, 113, 113, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                grid: { color: 'rgba(148, 163, 184, 0.1)' },
                                ticks: { color: '#94a3b8' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#94a3b8' }
                            }
                        }
                    }
                });
            }, 100);
        }

        function closeModal() {
            document.getElementById('stockModal').classList.add('hidden');
        }

        function initChart() {
            const ctx = document.getElementById('sectorChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['科技', '新能源', '消费', '医药', '金融'],
                    datasets: [{
                        data: [35, 25, 20, 15, 5],
                        backgroundColor: [
                            'rgba(96, 165, 250, 0.8)',
                            'rgba(52, 211, 153, 0.8)',
                            'rgba(251, 191, 36, 0.8)',
                            'rgba(167, 139, 250, 0.8)',
                            'rgba(248, 113, 113, 0.8)'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
